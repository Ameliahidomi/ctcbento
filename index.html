<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>倉庫訂餐網</title>
<style>
:root{--page-width:900px;--bg:#fff4ea}
body{
  background:var(--bg);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
  color:#333;margin:0;display:flex;
  min-height:100vh;align-items:flex-start;
  justify-content:center;padding:40px 20px
}
.container{
  width:100%;max-width:var(--page-width);
  background:white;border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.07);
  padding:24px;box-sizing:border-box
}
h1{margin:0 0 12px;font-size:20px}
.row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
label{min-width:84px}
input,select{ padding:8px;border-radius:6px;border:1px solid #ddd }
button{
  padding:8px 12px;border-radius:8px;border:0;
  background:#ff8a4b;color:#fff;cursor:pointer;
  transition: transform 0.1s, filter 0.1s;
}
button:disabled{ background:#ccc !important; cursor:not-allowed; }
button.secondary{background:#ffb777;color:#000}
.center{display:flex;justify-content:center;gap:12px;margin:16px 0}
.menu-area{ border:1px dashed #ffd3b8; padding:12px;border-radius:8px;background:#fff7f0 }
.hidden{display:none}
.order-item{position:relative;padding:12px;padding-right:80px;border-bottom:1px solid #eee;margin-bottom:4px}
.order-item .delete-btn{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:#ff6b6b;color:#fff;border:0;
  border-radius:6px;padding:6px 12px;cursor:pointer
}
.small{font-size:13px;color:#555;margin-top:4px}
.note{font-size:12px;color:#777;margin-top:8px}

/* --- 公告視窗樣式修正 --- */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000;
}
.modal-content { 
  background: white; 
  padding: 30px 40px; 
  border-radius: 16px; 
  width: 540px; 
  max-width: 90%; 
  box-shadow: 0 12px 40px rgba(0,0,0,0.15); 
  position: relative;
  box-sizing: border-box;
  overflow: hidden;
}
.modal-header {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: rnlative;
  z-index: 10;
}
.modal-body { 
  text-align: left; 
  line-height: 1.8; 
  font-size: 16px;
  color: #333;
  margin-bottom: 25px;
  position: relative;
  z-index: 10;
}
.modal-body div { margin-bottom: 8px; }

.notice-bg-img {
  position: absolute;
  right: 10px;
  bottom: 10px;
  width: 180px; 
  z-index: 5;
  pointer-events: none;
}

.modal-footer {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

#closeNotice {
  padding: 10px 30px;
  font-size: 16px;
  font-weight: bold;
  background: #ff8a4b;
  border-radius: 10px;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}
</style>
</head>
<body>

<div id="noticeModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <span>📢</span> 訂餐注意事項
    </div>
    <div class="modal-body">
      <div>1. 每日訂餐截止時間請參考群組公告。</div>
      <div>2. 某些餐廳會有特殊餐點選擇，如有出現欄位請務必選擇。</div>
      <div>3. 若餐點有特殊過敏原請務必在備註註明。</div>
      <div>4. 下單後請確認即時清單內容是否正確。</div>
      <div>5. 如訂餐系統有任何疑問請即時反應給團主修正。</div>
    </div>
    
    <img src="https://raw.githubusercontent.com/Ameliahidomi/ctcbento/main/Emoji.png" class="notice-bg-img" alt="Thank you">
    
    <div class="modal-footer">
      <button id="closeNotice">我了解了</button>
    </div>
  </div>
</div>

<div class="container">
  <h1>倉庫訂餐網</h1>
  
  <div id="page-login" class="hidden">
    <div class="row"><label>🆔 員工工號</label><input id="empId" type="text" placeholder="輸入工號" /></div>
    <div class="center"><button id="btnLogin">登入</button></div>
  </div>

  <div id="page-home" class="hidden">
    <p id="welcome" style="font-weight:bold; font-size:18px"></p>
    <div class="center"><button id="toLunch">🍱 午餐</button><button id="toTea" class="secondary">☕ 下午茶</button></div>
  </div>

  <div id="page-lunch" class="hidden">
    <div class="row"><label>🏪 餐廳名稱</label><select id="restaurant"></select></div>
    
    <div class="menu-area">
      <div class="row"><label>🍲 餐點選擇</label><select id="menuItem"></select></div>
      
      <div id="additionalRow" class="row hidden">
        <label id="additionalLabel">⚙️ 選項</label>
        <div id="potMainContainer"></div>
      </div>

      <div id="friesRow" class="row hidden"><label>🍟 加購薯條</label><select id="addFries"><option value="">不加購</option><option value="加購薯條-$30">加購薯條-$30</option></select></div>
      
      <div class="row"><label>🧂 調味</label><select id="spice"><option>不加</option><option>微辣</option><option>小辣</option><option>中辣</option><option>加醋</option></select></div>
      <div class="row"><label>🔢 數量</label><input id="qty" type="number" min="1" value="1" style="width:80px"></div>
      <div class="row"><label>📝 備註</label><input id="note" placeholder="例: 少醬、不要蔥"></div>
      
      <div class="center">
        <button id="addLunch">➕ 新增訂單</button>
        <button id="backFromLunch" class="secondary">⬅️ 回上一頁</button>
      </div>
    </div>
  </div>

  <div class="orders">
    <h3 style="margin-top:30px">📋 我的訂單（即時顯示）</h3>
    <div id="ordersList"></div>
    <p style="font-size:13px; color:#666; margin-top:10px">僅顯示你本人的訂單，可隨時刪除。</p>
  </div>
</div>

<script>
const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyznRRA7TJ28X9TtMU_0r2qhXUemySqgICb6kI-Jd2YA0zzhJxEK6OQr1JOkyL7YtXK/exec";

const potMainConfigs = {
  "老江紅茶": { categoryKey: "套餐組合", options: ["紅茶冰-$81", "冷泡茶-$81", "小杯奶茶-$89", "中杯奶茶-$106"], label: "🥤 套餐飲料", hasFries: true },
  "老李小火鍋": { categoryKey: "鍋物湯底", options: ["白飯", "意麵", "科學麵", "冬粉", "蒸煮麵", "王子麵"], label: "🍜 主食選擇" },
  "北平京廚北方麵食館": { categoryKey: "麵食類", options: ["刀削麵", "細麵"], label: "🍜 麵體選擇" },
  "小琉球菜尾": { itemKey: "蛋炒飯", options: ["不要蒜", "不要蔥", "不要洋蔥", "不要胡椒"], label: "🚫 客製需求", isMulti: true }
};

let CURRENT_USER = null; let MENUS = {};
const el = id => document.getElementById(id);

el("closeNotice").onclick = () => { el("noticeModal").style.display = "none"; el("page-login").classList.remove("hidden"); };

el("btnLogin").onclick = async () => {
  const empId = el("empId").value.trim(); if (!empId) return;
  el("btnLogin").disabled = true;
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getEmployees`);
    const data = await res.json();
    const found = data.find(e => String(e.id) === empId);
    if (found) { CURRENT_USER = found; el("page-login").classList.add("hidden"); el("page-home").classList.remove("hidden"); el("welcome").textContent = `歡迎 ${found.name}`; loadMenus(); renderOrders(); }
    else { alert("工號錯誤"); el("btnLogin").disabled = false; }
  } catch (e) { alert("系統錯誤"); el("btnLogin").disabled = false; }
};

async function loadMenus() {
  const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getMenus`);
  MENUS = await res.json();
  const sel = el("restaurant"); sel.innerHTML = "";
  Object.keys(MENUS).forEach(r => { const opt = document.createElement("option"); opt.value = r; opt.textContent = r; sel.appendChild(opt); });
  if (sel.options.length > 0) populateMenu(sel.value);
}

function populateMenu(restaurant) {
  const sel = el("menuItem"); sel.innerHTML = "";
  const items = MENUS[restaurant] || [];
  items.forEach(it => {
    const opt = document.createElement("option"); opt.value = JSON.stringify(it);
    opt.textContent = `${it.name} — ${it.price}元`; sel.appendChild(opt);
  });
  el("qty").value = 1; el("note").value = "";
  handleDynamicUI();
}

function handleDynamicUI() {
  const restaurant = el("restaurant").value; 
  const itemVal = el("menuItem").value;
  const container = el("potMainContainer");
  if (!itemVal) return;
  const itemObj = JSON.parse(itemVal);
  const config = potMainConfigs[Object.keys(potMainConfigs).find(k => restaurant.includes(k))];
  
  const match = config && ((config.categoryKey && itemObj.cat.includes(config.categoryKey)) || (config.itemKey && itemObj.name.includes(config.itemKey)));

  if (match) {
    el("additionalLabel").textContent = config.label;
    if (config.isMulti) {
      container.innerHTML = config.options.map(o => `<label style="margin-right:8px"><input type="checkbox" name="customOption" value="${o}"> ${o}</label>`).join('');
    } else {
      container.innerHTML = `<select id="potMain">${config.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
    }
    el("additionalRow").classList.remove("hidden");
    config.hasFries ? el("friesRow").classList.remove("hidden") : el("friesRow").classList.add("hidden");
  } else { 
    el("additionalRow").classList.add("hidden"); el("friesRow").classList.add("hidden");
  }
}

el("addLunch").onclick = async () => {
  const itemObj = JSON.parse(el("menuItem").value);
  el("addLunch").disabled = true;
  
  const checkboxes = document.querySelectorAll('input[name="customOption"]:checked');
  let potMainVal = checkboxes.length ? Array.from(checkboxes).map(cb => cb.value).join(', ') : (el("potMain") ? el("potMain").value : "");

  // 取得當前日期 YYYY-MM-DD
  const today = new Date().toISOString().split('T')[0];

  const params = new URLSearchParams({
    action: "add", 
    date: today, // 補上 Date 欄位傳回後端[cite: 3]
    employee: CURRENT_USER.name, 
    restaurant: el("restaurant").value,
    category: itemObj.cat, 
    item: itemObj.name, 
    price: itemObj.price, 
    spice: el("spice").value, 
    qty: el("qty").value, 
    note: el("note").value, 
    potMain: potMainVal
  });

  await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: params });
  alert("訂單已新增"); 
  
  el("qty").value = 1; el("note").value = "";
  renderOrders(); 
  el("addLunch").disabled = false;
};

async function renderOrders() {
  const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getOrders&employee=${encodeURIComponent(CURRENT_USER.name)}`);
  const data = await res.json();
  const list = el("ordersList"); list.innerHTML = "";
  data.forEach((o, index) => {
    const div = document.createElement("div"); div.className = "order-item";
    div.innerHTML = `
      <div><strong>#${index + 1} ${o.restaurant} - ${o.item}</strong></div>
      <div class="order-info">數量: ${o.qty} | 調味: ${o.spice}</div>
      <div class="order-info">備註: ${o.note} | 選項: ${o.potMain || "無"}</div>
      <button class="delete-btn" onclick="deleteOrder('${o.id}')">🗑️ 刪除</button>
    `;
    list.appendChild(div);
  });
}

async function deleteOrder(id) {
  if (!confirm("確定刪除？")) return;
  await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: new URLSearchParams({action:"delete", id, employee: CURRENT_USER.name}) });
  renderOrders();
}

el("restaurant").onchange = () => populateMenu(el("restaurant").value);
el("menuItem").onchange = handleDynamicUI;
el("toLunch").onclick = () => { el("page-home").classList.add("hidden"); el("page-lunch").classList.remove("hidden"); };
el("backFromLunch").onclick = () => { el("page-lunch").classList.add("hidden"); el("page-home").classList.remove("hidden"); };
</script>
</body>
</html>
