<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>倉庫訂餐網</title>
<style>
:root{--page-width:900px;--bg:#fff4ea}
body{
  background:var(--bg);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
  color:#333;margin:0;display:flex;
  min-height:100vh;align-items:flex-start;
  justify-content:center;padding:40px 20px
}
.container{
  width:100%;max-width:var(--page-width);
  background:white;border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.07);
  padding:24px;box-sizing:border-box
}
h1{margin:0 0 12px;font-size:20px}
.row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
label{min-width:84px}
input,select{ padding:8px;border-radius:6px;border:1px solid #ddd }
button{
  padding:8px 12px;border-radius:8px;border:0;
  background:#ff8a4b;color:#fff;cursor:pointer;
  transition: transform 0.1s, filter 0.1s;
}
button:disabled{ background:#ccc !important; cursor:not-allowed; }
button.secondary{background:#ffb777;color:#000}
.center{display:flex;justify-content:center;gap:12px;margin:16px 0}
.menu-area{ border:1px dashed #ffd3b8; padding:12px;border-radius:8px;background:#fff7f0 }
.hidden{display:none}
.order-item{position:relative;padding:12px;padding-right:80px;border-bottom:1px solid #eee;margin-bottom:4px}
.order-item .delete-btn{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:#ff6b6b;color:#fff;border:0;
  border-radius:6px;padding:6px 12px;cursor:pointer
}
.small{font-size:13px;color:#555;margin-top:4px}
.note{font-size:12px;color:#777;margin-top:8px}

/* --- 彈窗樣式修正 --- */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000;
}
.modal-content { 
  background: white; 
  padding: 30px 40px; 
  border-radius: 16px; /* 調回原始大小的弧度 */
  width: 540px; 
  max-width: 90%; 
  box-shadow: 0 12px 40px rgba(0,0,0,0.15); 
  position: relative;
  box-sizing: border-box;
  overflow: hidden;
}
.modal-header {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  z-index: 10; /* 確保在圖片上方 */
}
.modal-body { 
  text-align: left; 
  line-height: 1.8; 
  font-size: 16px;
  color: #333;
  position: relative;
  z-index: 10; /* 確保文字在最前方 */
  margin-bottom: 20px;
}
.modal-body div { margin-bottom: 8px; }

/* 圖片設置：不淡化，且置於文字後方 */
.notice-bg-img {
  position: absolute;
  right: 15px;
  bottom: 25px;
  width: 170px; 
  opacity: 1; /* 不淡化，保持原始色彩 */
  z-index: 1; /* 位於文字背景層 */
  pointer-events: none;
}

/* 按鈕位置：視窗底部正中央 */
.modal-footer {
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 10;
  margin-top: 20px;
}

#closeNotice {
  padding: 7px 20px;
  font-size: 16px;
  font-weight: bold;
  background: #ff88a4b;
  border-radius: 8px;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}
</style>
</head>
<body>

<div id="noticeModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <span>📢</span> 訂餐注意事項
    </div>
    <div class="modal-body">
      <div>1. 每日訂餐截止時間請參考群組公告。</div>
      <div>2. 某些餐廳會有特殊餐點選擇，如有出現欄位請務必選擇。</div>
      <div>3. 若餐點有特殊過敏原請務必在備註註明。</div>
      <div>4. 下單後請確認即時清單內容是否正確。</div>
      <div>5. 如訂餐系統有任何疑問請即時反應給團主修正。</div>
    </div>
    
    <img src="https://raw.githubusercontent.com/Ameliahidomi/ctcbento/main/Emoji.png" class="notice-bg-img" alt="Thank you">
    
    <div class="modal-footer">
      <button id="closeNotice">我了解了</button>
    </div>
  </div>
</div>

<div class="container">
  <h1>倉庫訂餐網</h1>
  <div id="page-login" class="hidden">
    <div class="row"><label>員工工號</label><input id="empId" type="text" placeholder="輸入工號" /></div>
    <div class="center"><button id="btnLogin">登入</button></div>
  </div>
  <div id="page-home" class="hidden">
    <p id="welcome"></p>
    <div class="center"><button id="toLunch">🍱午餐</button><button id="toTea" class="secondary">☕下午茶</button></div>
  </div>
  <div id="page-lunch" class="hidden">
    <div class="row"><label>🏪餐廳名稱</label><select id="restaurant"></select></div>
    <div class="menu-area">
      <div class="row"><label>🍲餐點選擇</label><select id="menuItem"></select></div>
      <div id="additionalRow" class="row hidden"><label id="additionalLabel">備選</label><select id="potMain"></select></div>
      <div id="friesRow" class="row hidden"><label>🍟加購薯條</label><select id="addFries"><option value="">不加購</option><option value="加購薯條-$30">加購薯條-$30</option></select></div>
      <div class="row"><label>🧂調味</label><select id="spice"><option>不加</option><option>微辣</option><option>小辣</option><option>中辣</option><option>加醋</option></select></div>
      <div class="row"><label>🔢數量</label><input id="qty" type="number" min="1" value="1" style="width:70px"></div>
      <div class="row"><label>📝備註</label><input id="note" placeholder="例: 少醬、不要蔥"></div>
      <div class="center"><button id="addLunch">➕新增訂單</button><button id="backFromLunch" class="secondary">⬅️回上一頁</button></div>
    </div>
  </div>
  <div class="orders">
    <h3>📋我的訂單（即時顯示）</h3>
    <div id="ordersList"></div>
    <p class="note">僅顯示你本人的訂單，可隨時刪除。</p>
  </div>
</div>

<script>
// 此處保留您原本的 JS 邏輯
const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyznRRA7TJ28X9TtMU_0r2qhXUemySqgICb6kI-Jd2YA0zzhJxEK6OQr1JOkyL7YtXK/exec";
const potMainConfigs = {
  "老江紅茶": { categoryKey: "套餐組合", options: ["紅茶冰-$81", "冷泡茶-$81", "小杯奶茶-$89", "中杯奶茶-$106"], label: "🥤套餐飲料", hasFries: true },
  "老李小火鍋": { categoryKey: "鍋物湯底", options: ["白飯", "意麵", "科學麵", "冬粉", "蒸煮麵", "王子麵"], label: "🍜主食選擇" },
  "北平京廚北方麵食館": { categoryKey: "麵食類", options: ["刀削麵", "細麵"], label: "🍜麵體選擇" },
  "古早魏爌肉飯": { categoryKey: "麵食類", options: ["細麵", "扁麵"], label: "🍜主食選擇" }
};
let CURRENT_USER = null; let MENUS = {};
const el = id => document.getElementById(id);
el("closeNotice").addEventListener("click", () => { el("noticeModal").style.display = "none"; el("page-login").classList.remove("hidden"); });
el("btnLogin").addEventListener("click", async () => {
  const empId = el("empId").value.trim();
  if (!empId) return alert("請輸入工號");
  el("btnLogin").disabled = true;
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getEmployees`);
    const employees = await res.json();
    const found = employees.find(e => String(e.id) === empId);
    if (found) {
      CURRENT_USER = found; el("page-login").classList.add("hidden"); el("page-home").classList.remove("hidden");
      el("welcome").textContent = `歡迎 ${found.name}`; loadMenus(); renderOrders();
    } else { alert("工號不存在"); el("btnLogin").disabled = false; }
  } catch (e) { alert("登入失敗"); el("btnLogin").disabled = false; }
});
async function loadMenus() {
  const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getMenus`);
  MENUS = await res.json();
  const sel = el("restaurant"); sel.innerHTML = "";
  Object.keys(MENUS).forEach(r => { const opt = document.createElement("option"); opt.value = r; opt.textContent = r; sel.appendChild(opt); });
  if (sel.options.length > 0) populateMenu(sel.value);
}
function populateMenu(restaurant) {
  const sel = el("menuItem"); sel.innerHTML = "";
  const items = MENUS[restaurant] || [];
  let lastCat = null;
  items.forEach(it => {
    if (it.cat !== lastCat) {
      const catOpt = document.createElement("option"); catOpt.disabled = true;
      catOpt.textContent = `-${it.cat}-`; catOpt.style.fontWeight = "bold"; sel.appendChild(catOpt); lastCat = it.cat;
    }
    const option = document.createElement("option"); option.value = JSON.stringify(it);
    option.textContent = `${it.name} — ${it.price}元`; sel.appendChild(option);
  });
  handleDynamicUI();
}
function handleDynamicUI() {
  const restaurant = el("restaurant").value; const itemVal = el("menuItem").value;
  if (!itemVal) return;
  const itemObj = JSON.parse(itemVal);
  const configKey = Object.keys(potMainConfigs).find(k => restaurant.includes(k));
  const config = potMainConfigs[configKey];
  const cleanCat = (itemObj.cat || "").replace(/\s+/g, '');
  if (config && cleanCat.includes(config.categoryKey)) {
    el("additionalLabel").textContent = config.label;
    el("potMain").innerHTML = config.options.map(o => `<option>${o}</option>`).join('');
    el("additionalRow").classList.remove("hidden");
    if (config.hasFries) el("friesRow").classList.remove("hidden");
  } else { el("additionalRow").classList.add("hidden"); el("friesRow").classList.add("hidden"); }
}
async function renderOrders() {
  if (!CURRENT_USER) return;
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getOrders&employee=${encodeURIComponent(CURRENT_USER.name)}`);
    const data = await res.json();
    const list = el("ordersList"); list.innerHTML = "";
    data.forEach((o, idx) => {
      const div = document.createElement("div"); div.className = "order-item";
      div.innerHTML = `<strong>#${idx+1} ${o.restaurant} - ${o.item}</strong><div class="small">數量: ${o.qty}｜調味: ${o.spice || "無"}</div><div class="small">備註: ${o.note || ""} ${o.potMain ? "｜選項: "+o.potMain : ""}</div><button class="delete-btn" data-id="${o.id}">🗑️刪除</button>`;
      list.appendChild(div);
    });
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("確定要刪除這筆訂單嗎？")) return;
        const params = new URLSearchParams(); params.append("action", "delete"); params.append("id", btn.dataset.id); params.append("employee", CURRENT_USER.name);
        try { await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: params }); renderOrders(); }
        catch (e) { alert("刪除失敗"); }
      });
    });
  } catch (e) { console.error("加載訂單失敗", e); }
}
el("addLunch").addEventListener("click", async () => {
  const itemVal = el("menuItem").value; if (!itemVal) return alert("請選擇餐點");
  const itemObj = JSON.parse(itemVal);
  el("addLunch").disabled = true;
  let finalNote = el("note").value; const friesVal = el("addFries").value;
  if (friesVal && !el("friesRow").classList.contains("hidden")) { finalNote = finalNote ? `${finalNote} / ${friesVal}` : friesVal; }
  const params = new URLSearchParams();
  params.append("date", new Date().toISOString().slice(0, 10)); params.append("employee", CURRENT_USER.name);
  params.append("restaurant", el("restaurant").value); params.append("category", itemObj.cat || "");
  params.append("item", itemObj.name); params.append("price", itemObj.price || "");
  params.append("spice", el("spice").value); params.append("qty", el("qty").value);
  params.append("note", finalNote); params.append("potMain", el("potMain").value || "");
  try { await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: params }); alert("訂單已新增"); renderOrders(); el("note").value = ""; el("qty").value = 1; }
  catch (e) { alert("新增失敗"); }
  finally { el("addLunch").disabled = false; }
});
el("restaurant").addEventListener("change", () => populateMenu(el("restaurant").value));
el("menuItem").addEventListener("change", handleDynamicUI);
el("toLunch").addEventListener("click", () => { el("page-home").classList.add("hidden"); el("page-lunch").classList.remove("hidden"); });
el("backFromLunch").addEventListener("click", () => { el("page-lunch").classList.add("hidden"); el("page-home").classList.remove("hidden"); });
</script>
</body>
</html>
