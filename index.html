<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>倉庫訂餐網</title>

<style>
:root{--page-width:900px;--bg:#fff4ea}
body{
  background:var(--bg);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
  color:#333;margin:0;display:flex;
  min-height:100vh;align-items:flex-start;
  justify-content:center;padding:40px 20px
}
.container{
  width:100%;max-width:var(--page-width);
  background:white;border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.07);
  padding:24px;box-sizing:border-box
}
h1{margin:0 0 12px;font-size:20px}
.row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
label{min-width:84px}
input,select{
  padding:8px;border-radius:6px;border:1px solid #ddd
}
button{
  padding:8px 12px;border-radius:8px;border:0;
  background:#ff8a4b;color:#fff;cursor:pointer
}
button:disabled{ background:#ccc !important; cursor:not-allowed; }
button.secondary{background:#ffb777;color:#000}
.center{display:flex;justify-content:center;gap:12px;margin:16px 0}
.menu-area{
  border:1px dashed #ffd3b8;
  padding:12px;border-radius:8px;background:#fff7f0
}
.hidden{display:none}
.order-item{position:relative;padding-right:70px;border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:10px}
.order-item .delete-btn{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:#ff6b6b;color:#fff;border:0;
  border-radius:6px;padding:6px 10px;cursor:pointer
}
.small{font-size:13px;color:#555;margin-top:4px}
.note{font-size:12px;color:#777}
.loading-msg { font-size: 12px; color: #ff8a4b; font-weight: bold; }
</style>
</head>
<body>
<div class="container" role="application">
  <h1>倉庫訂餐網</h1>

  <div id="page-login">
    <div class="row">
      <label for="empId">員工工號</label>
      <input id="empId" type="text" placeholder="輸入工號 (6碼)" />
    </div>
    <div class="center">
      <button id="btnLogin">登入</button>
    </div>
  </div>

  <div id="page-home" class="hidden">
    <p id="welcome"></p>
    <div class="center">
      <button id="toLunch">🍱午餐</button>
      <button id="toTea" class="secondary">☕下午茶</button>
    </div>
  </div>

  <div id="page-lunch" class="hidden">
    <div class="row">
      <label for="restaurant">餐廳名稱</label>
      <select id="restaurant"></select>
    </div>

    <div class="menu-area">
      <div class="row">
        <label>餐點選擇</label>
        <select id="menuItem"></select>
      </div>

    <div class="row hidden" id="additionalRow">
      <label id="additionalLabel">醬料</label>
      <select id="potMain"></select>
    </div>

    <div class="row">
      <label>調味</label>
      <select id="spice">
        <option>不加</option>
        <option>微辣</option>
        <option>小辣</option>
        <option>中辣</option>
        <option>加醋</option>
      </select>
    </div>

    <div class="row">
      <label>數量</label>
      <input id="qty" type="number" min="1" value="1" style="width:70px">
    </div>

    <div class="row">
      <label>備註</label>
      <input id="note" placeholder="例: 少醬、不要蔥">
    </div>

    <div class="center">
      <button id="addLunch">新增訂單</button>
      <button id="backFromLunch" class="secondary">回上一頁</button>
      <span id="lunchLoading" class="loading-msg hidden">處理中...</span>
    </div>
  </div>
</div>

  <div id="page-tea" class="hidden">
    <div class="row">
      <label for="teaRestaurant">餐廳名稱</label>
      <select id="teaRestaurant"></select>
    </div>
    <div class="menu-area">
      <div class="row">
        <label>品項</label>
        <select id="teaItem"></select>
      </div>
      <div class="row">
        <label>數量</label>
        <input id="teaQty" type="number" min="1" value="1" style="width:70px" />
      </div>
      <div class="row">
        <label>備註</label>
        <input id="teaNote" placeholder="例: 醬少、加辣...." />
      </div>
      <div class="center">
        <button id="addTea">新增下午茶訂單</button>
        <button id="backFromTea" class="secondary">回上一頁</button>
        <span id="teaLoading" class="loading-msg hidden">處理中...</span>
      </div>
    </div>
  </div>

  <div class="orders">
    <h3>我的訂單（即時顯示）</h3>
    <div id="ordersList"></div>
    <p class="note">僅顯示你本人的訂單，可隨時刪除。</p>
  </div>
</div>

<script>
const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyznRRA7TJ28X9TtMU_0r2qhXUemySqgICb6kI-Jd2YA0zzhJxEK6OQr1JOkyL7YtXK/exec";

// ==========================================
// 餐廳特殊條件設定區
// ==========================================
const RESTAURANT_CONFIG = {
  "蘑菇咖哩": {
    triggerCat: "咖哩飯",
    options: ["黑咖哩(辣)", "甜咖哩(不辣)"]
    }
};
// ==========================================

let CURRENT_USER = null;
let MENUS = {};
let TEA_DATA = {};

const el = id => document.getElementById(id);

function resetLunchFields() {
  el("qty").value = 1;
  el("note").value = "";
  el("spice").selectedIndex = 0;
  if (el("potMain").options.length > 0) el("potMain").selectedIndex = 0;
}

// 核心邏輯：根據餐廳與類別判斷是否顯示主食
function handleRestaurantLogic() {
  const resName = el("restaurant").value;
  const itemVal = el("menuItem").value;
  const row = el("additionalRow");
  const select = el("potMain");
  
  if (!itemVal || itemVal.startsWith('--')) {
    row.classList.add("hidden");
    return;
  }

  try {
    const itemObj = JSON.parse(itemVal);
    const category = (itemObj.cat || "").replace(/\s+/g, ""); // 去除空白

    // 尋找符合目前餐廳名稱的設定鍵值
    const configKey = Object.keys(RESTAURANT_CONFIG).find(key => resName.includes(key));
    const config = RESTAURANT_CONFIG[configKey];

    // 如果餐廳有設定，且類別包含觸發關鍵字
    if (config && category.includes(config.triggerCat)) {
      select.innerHTML = config.options.map(opt => `<option>${opt}</option>`).join('');
      row.classList.remove("hidden");
    } else {
      row.classList.add("hidden");
    }
  } catch (e) {
    row.classList.add("hidden");
  }
}

function toggleLoading(type, isLoading) {
  const btn = type === 'lunch' ? el("addLunch") : el("addTea");
  const msg = type === 'lunch' ? el("lunchLoading") : el("teaLoading");
  btn.disabled = isLoading;
  if(isLoading) msg.classList.remove("hidden");
  else msg.classList.add("hidden");
}

async function loadMenus() {
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getMenus`);
    MENUS = await res.json();
    const sel = el("restaurant");
    sel.innerHTML = "";
    Object.keys(MENUS).forEach(r => {
      const opt = document.createElement("option");
      opt.value = r; opt.textContent = r;
      sel.appendChild(opt);
    });
    if (sel.options.length > 0) populateMenu(sel.value);
  } catch (e) { console.error(e); }
}

function populateMenu(restaurant) {
  const sel = el("menuItem");
  sel.innerHTML = "";
  const items = MENUS[restaurant] || [];
  let lastCat = null;
  items.forEach(it => {
    if (it.cat !== lastCat) {
      const catOpt = document.createElement("option");
      catOpt.disabled = true; 
      catOpt.textContent = `-${it.cat}-`;
      sel.appendChild(catOpt);
      lastCat = it.cat;
    }
    const opt = document.createElement("option");
    opt.value = JSON.stringify(it);
    opt.textContent = `${it.name} — ${it.price}元`;
    sel.appendChild(opt);
  });
  handleRestaurantLogic();
}

el("restaurant").addEventListener("change", () => {
  const val = el("restaurant").value;
  if (val.includes("漢堡王")) {
    window.open("https://forms.gle/zrCN8DFXG1zqW3TC8", "_blank");
    el("restaurant").selectedIndex = 0;
    populateMenu(el("restaurant").value);
    return;
  }
  resetLunchFields();
  populateMenu(val);
});

el("menuItem").addEventListener("change", () => {
  handleRestaurantLogic(); 
});

el("btnLogin").addEventListener("click", async () => {
  const empId = el("empId").value.trim();
  el("btnLogin").disabled = true;
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getEmployees`);
    const employees = await res.json();
    const found = employees.find(e => String(e.id) === empId);
    if (found) {
      CURRENT_USER = found;
      el("page-login").classList.add("hidden");
      el("page-home").classList.remove("hidden");
      el("welcome").textContent = `歡迎 ${found.name}`;
      loadMenus();
      renderOrders();
    } else { alert("工號不存在"); el("btnLogin").disabled = false; }
  } catch (e) { alert("登入失敗"); el("btnLogin").disabled = false; }
});

el("addLunch").addEventListener("click", async () => {
  const itemVal = el("menuItem").value;
  if (!itemVal) return alert("請選擇餐點");
  
  const itemObj = JSON.parse(itemVal);
  toggleLoading('lunch', true);

  const resName = el("restaurant").value;
  const category = (itemObj.cat || "").replace(/\s+/g, "");
  
  // 檢查是否需要傳送額外的主食欄位
  const configKey = Object.keys(RESTAURANT_CONFIG).find(key => resName.includes(key));
  const config = RESTAURANT_CONFIG[configKey];
  const isSpecial = config && category.includes(config.triggerCat);

  const params = new URLSearchParams();
  params.append("date", new Date().toISOString().slice(0, 10));
  params.append("employee", CURRENT_USER.name);
  params.append("restaurant", resName);
  params.append("category", itemObj.cat || "");
  params.append("item", itemObj.name);
  params.append("price", itemObj.price ?? "");
  params.append("spice", el("spice").value);
  params.append("qty", el("qty").value);
  params.append("note", el("note").value);
  params.append("potMain", isSpecial ? el("potMain").value : "");

  try {
    await fetch(GOOGLE_WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: params,
    });
    alert("訂單已新增");
    renderOrders();
    resetLunchFields();
    handleRestaurantLogic();
  } catch (e) { alert("新增失敗"); }
  finally { toggleLoading('lunch', false); }
});

async function renderOrders() {
  if (!CURRENT_USER) return;
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getOrders&employee=${encodeURIComponent(CURRENT_USER.name)}`);
    const data = await res.json();
    const list = el("ordersList");
    list.innerHTML = "";
    data.forEach((o, idx) => {
      const div = document.createElement("div");
      div.className = "order-item";
      div.innerHTML = `
        <strong>#${idx + 1} ${o.restaurant} - ${o.item}</strong>
        <div class="small">數量: ${o.qty}｜價格: ${o.price}｜調味: ${o.spice || ""}</div>
        <div class="small">備註: ${o.note || ""}${o.potMain ? "｜主食: " + o.potMain : ""}</div>
        <button class="delete-btn" data-id="${o.id}">刪除</button>
      `;
      list.appendChild(div);
    });
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        btn.disabled = true; btn.innerText = "...";
        const params = new URLSearchParams();
        params.append("action", "delete");
        params.append("id", btn.dataset.id);
        params.append("employee", CURRENT_USER.name);
        await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: params });
        renderOrders();
      });
    });
  } catch (e) { console.error(e); }
}

el("toLunch").addEventListener("click", () => { el("page-home").classList.add("hidden"); el("page-lunch").classList.remove("hidden"); });
el("toTea").addEventListener("click", () => { el("page-home").classList.add("hidden"); el("page-tea").classList.remove("hidden"); loadTeaMenus(); });
el("backFromLunch").addEventListener("click", () => { el("page-lunch").classList.add("hidden"); el("page-home").classList.remove("hidden"); });
el("backFromTea").addEventListener("click", () => { el("page-tea").classList.add("hidden"); el("page-home").classList.remove("hidden"); });

async function loadTeaMenus() {
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getTeaMenus`);
    TEA_DATA = await res.json();
    const ts = el("teaRestaurant");
    ts.innerHTML = "";
    Object.keys(TEA_DATA).forEach(r => {
      const opt = document.createElement("option");
      opt.value = r; opt.textContent = r;
      ts.appendChild(opt);
    });
    if (ts.options.length > 0) populateTeaMenu(ts.value);
  } catch (e) { console.error(e); }
}
function populateTeaMenu(resName) {
  const ti = el("teaItem");
  ti.innerHTML = "";
  (TEA_DATA[resName] || []).forEach(it => {
    const opt = document.createElement("option");
    opt.value = JSON.stringify(it);
    opt.textContent = `${it.name} — ${it.price}元`;
    ti.appendChild(opt);
  });
}
el("teaRestaurant").addEventListener("change", () => populateTeaMenu(el("teaRestaurant").value));
</script>
</body>
</html>
